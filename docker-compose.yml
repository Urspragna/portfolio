# Production-flavoured local stack: FastAPI + PostgreSQL with pgvector.
# Run:  docker compose up --build

services:
  api:
    build: .
    container_name: portfolio-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # When DB env is set, the app speaks Postgres instead of local SQLite.
      DATABASE_URL: postgresql+asyncpg://portfolio:portfolio@db:5432/portfolio
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: portfolio-db
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
